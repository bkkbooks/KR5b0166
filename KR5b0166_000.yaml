front:
  text: 諸師聖誕沖舉酌獻儀一十四
  hash: sha256:b49bc23db13fde34569da4f67e8a72f39860199f6bad73178cf5c662ee8a9370
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0166_HFL_000-001a, image: hfl/0265/0265-146.png}
body:
  text: 玉帝聖誕酌獻儀正月初九日虹流藹瑞瞻香案於昊天鵠立馳誠薦芳樽於福地恭炷道德真香虔誠奏啓供養太上開天執符御曆含真體道昊天玉皇大天尊玄穹髙上帝光嚴妙樂國王聖父天尊寶月光皇太后聖母元君金闕彌羅聖衆玉京侍衛髙真悉仗真香普同供養再炷真香奏啓供養虛無自然三清三境天尊北極紫微大帝南極天皇上帝承天效法后土皇地祇三界萬靈十方真宰是日朝賀一切真靈恭望洪慈俯垂洞鑑宣意伏以大道無形妙萬物而資始至真罔象制群品以御圖妙用難窺靈機莫測庸假無文之敬式殫慶聖之恭恭惟昊天玉皇大天尊玄穹髙上帝天地同明日月合德浮黎真境記傳受道之初紫微上宫顯示度人之旨出寶書於天篆發金紐於霞文乃大梵之天章實諸天之隱韻煥爾不言之教超乎無眹之機八角垂芒孰窺浩劫二儀應運莫測真源允希監宥之私少副依歸之志諸天慶會三境非遙玉樹仙花睇玉虛之咫尺琅輿碧輦演瓊韻以雍容謹運虔恭禮伸初獻伏以鬱羅蕭臺現有為之梵相溟涬大梵具無極之神通斯玄祖之靈樞實穹皇之要旨昏衢慧燭溟渤舟航上則安國康民下而扶危度厄拯提趣類絶智愚髙下之分敷暢真玄破無有色空之礙顧惟菲簿莫匪甄陶伏念某等餐聽法音普沾聖澤聞演説而歎希有益開悟而感弘慈洊逢降世之佳辰用謹朝元於平旦如無邊明鏡在供養尊禮以奚為若大音洪鍾雖寂寞扣求而必應不遺再瀆尚賜居歆再拜上香禮伸二獻伏以妙有真境普示現國王之身彌羅上宫即根本帝尊之位具一氣胚胎之萃全三光浩渺之真妙德難思神通莫議隱隱玉京之上巍巍金闕之髙五千祕言融三才之大道八千餘度接六趣之衆生自然而然非識可識定而能應去來自在以無拘合而可分變化圓通而莫測演清淨解脫之旨濟沈迷憂苦之途周遊於三境之中溥現於十方之上伏願不違童瀆惟簡帝心鑑齋戒沐浴之虔開覆燾載持之造照臨有赫喜慶難言傾倒虔恭禮終三獻宣疏回向伏願天聽惟明帝心有鑒長而不宰與天地以為宗仰之彌髙超形名而獨立恩全民物澤被邦家祖天師誕辰正月十五日天上蘅薇記千載生仙之旦人間蕉荔表一時慶聖之心恭炷真香供養祖師三天扶教輔元體道大法天師正一沖玄神化靜應顯佑真君六合無窮髙明大帝降魔護道天尊聖祖漢師相留文成侯正一聖父桐柏真人正一聖母元君嗣師太清演教妙道真君系師太清昭化廣德真君正一女師元君左右侍宸王趙二真人正一文姬仙女文光仙女玉蘭仙女芳芝仙女奉車都尉樓亭侯義陽太守閬中侯南郡太守侍御史正一歷代天師真人元君仙姑仙祖仙宗飛騰仙眷本觀香火髙真雷霆法部官將真官土地江東之神三界朝賀一切真靈悉運真香普同供養宣意伏以啓運鶴鳴丕闡無窮之靈化分榮魚鬣誕膺太上之休光由漢室以著稱繼留侯而濟美山林瞻仰海宇歸崇恭惟祖師正一真君正一之宗玄元之主代天濟世以寶籙而傳後人度地修真養金丹而成大道印劒之纂承悠逺功行之表著恢弘緑輦丹輿感金闕至真之降龍章鳳篆探紫陽內典之藏奉聖朝褒鍚之尊見師造覆持之廣神風遐著紫霧彌羅龍戲麟盤仰翩翩而下逮鸞鳴鳳唱斯秩秩以居歆輒運虔恭禮伸初獻伏以天為星辰地為河嶽關百世之盛衰衣之冠冕水之本源寄後人之瞻仰三天具慶四海歡騰自惟至道儲精實乃先天育秀流芳根本茂枝葉以光榮沃潤山林如草木之衣被伏念某等仰依師廕寓處琳庭每依倣以有懷惟奉持而弗替尚監勤拳之至俯垂享格之私休有烈光洞融妙義天顔有喜春浮芝臉以增輝雲氣祥光日近薇垣而藹瑞際會風雲於天上近瞻日月於人間再運丹𠂻禮伸二獻伏以六鼇駕山變鳳扶輦洊惟慶誕之良時五老啓途群仙翼轅用致贊揚於今日轉鈞有造覆錦惟懷巍乎泰省之崇翊此清門之化無往不在與時偕行魚鬛端披喜共覩天人之相虬髯正視若再瞻日月之光方蘅薇之香氣又新念葵藿之丹誠難泯三薰益謹百拜惟恭奉疏牘以敷言潔壽解而稱頌恩庥知自悃欵奚殫伏願鑑行潦之微芹沃餘波於奕葉明明在上永垂耀於真風赫赫厥靈尚依光於化日德輝無盡仙道彌昌傾倒虔恭禮終三獻宣疏回向伏願執道之樞與天同運教宗蒙潤魚衣承雨露之恩帝所垂光鳬舄履星辰之上琳庭清肅道衆安和道祖降誕獻文二月十五日大道無名式際降生之旦至神有赫庸殫慶贊之誠恭炷道德真香虔誠奏啓供養太清仙境太上老君道德天尊混元上德皇帝恭望道慈洞回昭鑑再運真香虔誠奏啓供養玉清元始天尊上清靈寶天尊金闕諸天上帝大羅妙有髙真法主玄天上帝祖師正一真君三界十方千真萬聖雷霆法部官將江東土地之神是日朝賀一切真靈悉運真香普同供養宣意伏以生無始而隨無終玄通冥寂可常名而非常道清淨自然稟妙氣於玉虛現粹容於神室恭惟太上老君混元皇帝主玄元教居太赤天立民物而運乾坤宰隂陽而行日月甄陶品類拯濟顯幽方青陽時序之中乃紫府真元之節九清慶洽三極祥開流瑞藹於玄樞煥靈光於壽域爰伸賀悃敬奉慶儀白鹿引車若光臨於漢室青牛擁駕猶下逮於周朝謹運丹衷禮伸𥘉獻伏以九龍擁瑞紀育聖之昌辰八鸞同鳴洊迎真於榖旦闡揚大化演繹靈音儼日淵月角之尊仰天步星行之道綱維萬化宰制三才伏念某等職守琳庭率循科範奉清光而對越瞻紫氣以彌髙戒蓬島之羽流潔林居之藻薦祇修玄典仰冀鑑觀自本自根等乾坤而同久非空非色超象數以獨尊再運丹𠂻禮伸二獻伏以金簡玉書闡神真於三洞父言聖訓垂道德於千齡誕揚清淨之風茂啓希夷之化開雲辨霞裾之緒發赤書玉字之玄教被中華恩周下土關令方深於望氣天人有待於傳經摶不得聽不聞雖大道獨超乎語默存者神過者化惟盛德則可以形容何以贊揚第勤薰沐伏願先天傳道浩劫指迷長為下土之津梁悉化群黎於方域馴至空同之問自無姑射之疵道統儲祥琳庭協慶傾倒虔恭禮終三獻經宣疏回向月惟春仲風光巳及於花辰壽與天齊道德斯臨於仙旦諸天同慶三界均歡伏願玉几髙明丹扄通徹國家寧一遵道德之常經天地後先超形名而獨立各諧清淨共底雍熙伏願道尊德貴林泉永樂於升平日冨月昌雨露均沾於化育髙真降誕三月三日三月三日正蘭亭修楔之辰一德一心慶金闕化身之聖恭炷真香虔誠供養萬法教主玉虛師相玄天上帝金闕化身蕩魔天尊聖父淨樂天君明真大帝聖母善勝天后瓊真上仙聖師豐乾大帝祖天師奉玄上相正一真君虛危二宿星君應化武曲星君文昌梓潼帝君武當山得道五伯靈官北極佑聖府天乙真慶宫元和遷校府官君將吏觀庭香火髙真雷霆法部官將真官土地江東之神是日朝賀三界真靈玄虛過往糾察真司悉仗真香普同供養宣意伏以夢日儲祥慶玄天而應化披雲望幸伏厚地以陳情諸天齊臨萬神唱奉恭惟教主玄天上帝得天之道執帝之符淨樂孕靈鍾五嶽三光之間氣虛危應宿合九霄八景之元和冝尊居北極之髙益光贊東吳之盛屢沐聖朝之華衮誕臻人世之葵傾細酌流霞順下風而獻奠庸修澗藻祈上聖以光臨謹運丹𠂻禮伸初獻伏以玉虛師相仰北極之崇髙金闕真尊寄後人之瞻覩靈光奕奕聖德巍巍然有願以皆從故無幽而不燭魁罡激指掃妖魔於六洞之中人鬼分離著功行於七日之內顯幽俱泰今古攸遵伏念某等叨沐甄陶惟深慶贊行藏用舍莫非聖訓之依覆燾匡扶所異靈休之及洊逢此日再啓玄風輒陳潢潦之儀以答鴻厖之貺不違童瀆尚鑒時忱瑶珮瓊裾下雲霄之浩蕩金錢寶馬略塵世之恭虔再運虔誠禮伸二獻伏以瀆則不告敢忘慶賀之私感而遂通仰藉好生之德神洋洋手如在皇剡剡兮揚靈第切瞻依肅嚴獻奠伏望迂臨下土惠鑒微忱蘋藻將誠三侑殷勤之禮山林多幸一瞻只尺之光庸罄一忱禮終三獻經宣疏回向春日融融開遍上林之桃李天顔穆穆敬修南澗之蘋蘩萬倍歡榮一誠慶賀伏願髙真洞鑒列聖垂慈格一念之精誠鍚九疇之洪範冠裳興盛琳宇昌安三髙真祖師沖舉獻文九月九日乘雲謁帝當九日之再臨酌水朝真仰三天之孔邇恭炷真香虔誠供養祖天師三天扶教輔元體道大法天師正一沖玄伸化靜應顯佑真君六合無窮髙明大帝降魔護道天尊餘聖位同前再炷真香供養萬法教主玉虛師相玄天上帝金闕化身蕩魔天尊聖父淨樂天君明真大帝聖母善勝天后瓊真上仙武當山得道靈官聖衆觀庭香火髙真雷霆法部官將真官土地江東之神是日朝贊一切真靈悉仗真香普同供養宣意伏以玉珮秋風記重陽之升舉金莖曉露對佳節以獻酬諸天下臨萬神唱奉恭惟祖天師正一真君執天之樞與天同運瑶峰玉局親傳九鼎之書絳節霓旌光被三天之詔由漢室龍興之世至蜀都鶴去之時益衍宗風光于今日載惟法主玄天上帝得天之道執帝之符淨樂孕靈鍾五嶽三光之間氣奎婁應宿合九霄八景之元和冝尊居北極之髙益光贊東吳之盛俱沐聖朝之華衮誕臻人境之葵傾細把茱萸順下風而獻奠庸修蘋藻祈上聖以光臨謹運丹𠂻禮伸初獻伏以紫芝眉宇仰師省之崇髙玄武旌旗寄後人之瞻覩靈光奕奕天視昭昭蓋與時以偕行乃無幽而不察鹿堂鹽井著功行於豐碑針澗榔梅重懷恩於下土無窮傾慕敢後朝修伏念某叨沐甄陶惟深慶贊行藏用舍莫非聖訓之依覆燾匡扶所兾靈庥之被荐逢此日再啓玄風輒陳潢潦之儀以答鴻厖之貺不違童瀆尚鑒時忱瑶珮瓊裾下雲霄之浩蕩寒泉秋菊略塵世之恭虔再運丹𠂻禮伸二獻伏以鸞書鳳誥承三天眷命之𨺚羽葆霓旌際九日升真之會神洋洋呼在上皇剡剡兮揚靈乘白雲至帝鄉功成别館受素書傳真訣威制群魔綿數千百年正一之傳恢二十八治宗風之盛化巢之功勳若被鎮天之威武非虛莫既贊宣肅嚴獻奠伏望迂臨下土惠鑒微忱茱菊流芳三侑殷勤之禮山林多幸一瞻只尺之光庸罄一忱禮終三獻宣疏回向鸞鶴浮空降威容於只尺冠裳列序致禮敬於再三八表秋淸諸天雲會伏願歆格微誠顯揚大教傳經玉局永光道德之宗主法玄天茂衍厖鴻之慶琳庭淸肅道衆和安神靈孚佑教弘道德之光儀相崇嚴運啓雍熙之治冠裳興盛琳宇昌安諸師聖誕沖舉酌獻儀終
